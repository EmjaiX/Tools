<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --navBarBackgroundColor: #4e4e4e;
            --navBarForegroundColor: #bebebe;
            --mainFormHeaderBackgroundColor: #bebebe;
            --mainFormHeaderForegroundColor: #bebebe;
        }
        body {
            margin: 0;
            flex-direction: column;
            height: 100vh;
            min-height: 400px;
        }
        body > *{
            margin: auto;
        }
        .navBar{
            padding-top: 5px;
            padding-left: 5px;
            padding-right: 5px;
            margin-left: -5px;
            margin-right: -5px;
            background-color: var(--navBarBackgroundColor);
            color: var(--navBarForegroundColor);
            width: 100%;
            height: 5vh;
            min-height: 40px;
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: space-between;
        }
        .navBar #home{
            font-size: larger;
        }
        .navBar .search{
            width: 15vw;
            min-width: 50px;
        }
        .navBar .controls{
            font-size: large;
        }

        .body{
            display: flex;
            min-height: 200px;

        }
        .mainForm{
            margin: auto;
            display: flex;
            flex-direction: column;
            width: 20vw;
            min-width: 100px;
        }
        .mainForm .header {
            background-color: var(--mainFormHeaderBackgroundColor);
            color: var(--mainFormForegroundColor);
            width: 100%;
        }
        .mainForm .form {}
        .mainForm .form input {}
        .mainForm .form button {}
    </style>
</head>
<body>
    <div class="navBar">
        <div id="home">{{WEBSITE}}</div>
        <div class="search"><input type="text" name="Search" id=""></div>
        <div class="controls">{{Settings}}</div>
    </div><div class="body">
    <div class="mainForm">
        <div class="header">Login</div>
        <div class="form">
            <input type="text" name="uname" id="" placeholder="Username or Email">
            <input type="password" name="password" id="" placeholder="Password">
            <!-- pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" -->
            <button id="formSubmit">Login</button>
            <input type="radio" name="operation" id="login" value="Login">
            <input type="radio" name="operation" id="register" value="Register">
        </div>
</div>
    </div>
</body>
</html>
